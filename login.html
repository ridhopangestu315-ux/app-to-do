<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - StudyFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="icon1.PNG">
  <style>
    :root {
      --bg: #eef3ff;
      --bg-soft: #f7f9ff;
      --surface: rgba(255, 255, 255, 0.9);
      --surface-strong: #ffffff;
      --surface-muted: #f3f6ff;
      --text: #121827;
      --text-soft: #65718b;
      --text-faint: #98a2b8;
      --line: rgba(116, 132, 170, 0.18);
      --line-strong: rgba(116, 132, 170, 0.28);
      --primary: #4f46e5;
      --primary-2: #7c3aed;
      --blue: #2563eb;
      --green: #16a34a;
      --yellow: #d97706;
      --red: #e11d48;
      --purple: #7c3aed;
      --shadow-card: 0 8px 22px rgba(31, 41, 75, 0.07);
      --shadow-hover: 0 12px 28px rgba(59, 70, 130, 0.12);
      --shadow-glow: 0 10px 24px rgba(79, 70, 229, 0.16);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --font: "Inter", "Segoe UI", system-ui, sans-serif;
    }

    body.mode-gelap {
      --bg: #0b1020;
      --bg-soft: #11182b;
      --surface: #151d32;
      --surface-strong: #18213a;
      --surface-muted: #1e2945;
      --text: #edf2ff;
      --text-soft: #a9b4cc;
      --text-faint: #68748d;
      --line: rgba(187, 199, 232, 0.14);
      --line-strong: rgba(187, 199, 232, 0.22);
      --shadow-card: 0 8px 20px rgba(0, 0, 0, 0.22);
      --shadow-hover: 0 12px 28px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 10%, rgba(124, 58, 237, 0.18), transparent 28rem),
        radial-gradient(circle at 88% 12%, rgba(37, 99, 235, 0.16), transparent 30rem),
        linear-gradient(135deg, var(--bg), var(--bg-soft));
      color: var(--text);
      font-family: var(--font);
      line-height: 1.5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    button, input, select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .latar-ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(79, 70, 229, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 70, 229, 0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent 78%);
    }

    .wadah-auth {
      width: 100%;
      max-width: 420px;
    }

    .kartu-auth {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(10px);
    }

    .header-auth {
      text-align: center;
      margin-bottom: 32px;
    }

    .ikon-auth {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      font-size: 24px;
      font-weight: 800;
      box-shadow: var(--shadow-glow);
      margin-bottom: 16px;
    }

    .header-auth h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .header-auth p {
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 500;
    }

    .form-auth {
      display: grid;
      gap: 16px;
      margin-bottom: 24px;
    }

    .grup-input {
      display: grid;
      gap: 8px;
    }

    .grup-input label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-soft);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .grup-input input {
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-muted);
      color: var(--text);
      font-size: 14px;
      transition: 0.2s ease;
    }

    .grup-input input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--surface-strong);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .grup-input input::placeholder {
      color: var(--text-faint);
    }

    .grup-input input.input-error {
      border-color: var(--red);
      background: rgba(225, 29, 72, 0.05);
    }

    .pesan-error {
      font-size: 12px;
      color: var(--red);
      font-weight: 600;
      margin-top: 4px;
      display: none;
    }

    .pesan-error.tampil {
      display: block;
    }

    .tombol-auth {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      font-size: 14px;
      font-weight: 700;
      transition: 0.2s ease;
      box-shadow: var(--shadow-glow);
    }

    .tombol-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(79, 70, 229, 0.24);
    }

    .tombol-auth:active {
      transform: translateY(0);
    }

    .tombol-auth.loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--text-faint);
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .link-auth {
      text-align: center;
      font-size: 14px;
    }

    .link-auth a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .link-auth a:hover {
      text-decoration: underline;
      opacity: 0.8;
    }

    .toast-auth {
      position: fixed;
      top: 20px;
      right: 20px;
      max-width: 320px;
      padding: 16px;
      border-radius: var(--radius-md);
      background: var(--surface-strong);
      border-left: 4px solid;
      box-shadow: var(--shadow-card);
      animation: slideIn 0.3s ease;
      font-size: 14px;
      font-weight: 600;
    }

    .toast-auth.success {
      border-left-color: var(--green);
      color: var(--green);
    }

    .toast-auth.error {
      border-left-color: var(--red);
      color: var(--red);
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .kartu-auth {
        padding: 24px;
      }

      .header-auth {
        margin-bottom: 24px;
      }

      .ikon-auth {
        width: 48px;
        height: 48px;
        font-size: 20px;
      }

      .header-auth h1 {
        font-size: 20px;
      }
    }

    .hidden {
      display: none;
    }

    body.mode-gelap .kartu-auth {
      background: var(--surface);
      border-color: var(--line);
    }
  </style>
</head>
<body>
  <div class="latar-ambient" aria-hidden="true"></div>
  
  <div class="wadah-auth">
    <!-- FORM LOGIN -->
    <div id="formLoginContainer" class="kartu-auth">
      <div class="header-auth">
        <div class="ikon-auth">SF</div>
        <h1>Login</h1>
        <p>Masuk ke akun StudyFlow Anda</p>
      </div>

      <form id="formLogin" class="form-auth" onsubmit="return handleLoginSubmit(event)">
        <div class="grup-input">
          <label for="emailLogin">Email</label>
          <input type="email" id="emailLogin" placeholder="user@example.com" required>
          <div class="pesan-error" id="errorEmailLogin"></div>
        </div>

        <div class="grup-input">
          <label for="passwordLogin">Password</label>
          <input type="password" id="passwordLogin" placeholder="Minimal 6 karakter" required>
          <div class="pesan-error" id="errorPasswordLogin"></div>
        </div>

        <button type="submit" class="tombol-auth" id="tombolLogin">Masuk</button>
      </form>

      <div class="divider">atau</div>

      <div class="link-auth">
        Belum punya akun? 
        <a href="#" onclick="tampilkanFormRegister(); return false;">Daftar di sini</a>
      </div>
    </div>

    <!-- FORM REGISTER -->
    <div id="formRegisterContainer" class="kartu-auth hidden">
      <div class="header-auth">
        <div class="ikon-auth">SF</div>
        <h1>Daftar</h1>
        <p>Buat akun StudyFlow baru</p>
      </div>

      <form id="formRegister" class="form-auth" onsubmit="return handleRegisterSubmit(event)">
        <div class="grup-input">
          <label for="namaRegister">Nama Lengkap</label>
          <input type="text" id="namaRegister" placeholder="Nama Anda" required>
          <div class="pesan-error" id="errorNamaRegister"></div>
        </div>

        <div class="grup-input">
          <label for="emailRegister">Email</label>
          <input type="email" id="emailRegister" placeholder="user@example.com" required>
          <div class="pesan-error" id="errorEmailRegister"></div>
        </div>

        <div class="grup-input">
          <label for="passwordRegister">Password</label>
          <input type="password" id="passwordRegister" placeholder="Minimal 6 karakter" required>
          <div class="pesan-error" id="errorPasswordRegister"></div>
        </div>

        <button type="submit" class="tombol-auth" id="tombolRegister">Daftar</button>
      </form>

      <div class="divider">atau</div>

      <div class="link-auth">
        Sudah punya akun? 
        <a href="#" onclick="tampilkanFormLogin(); return false;">Login di sini</a>
      </div>
    </div>
  </div>

  <script>
    /*
    ====================================================
    SCRIPT LOGIN & REGISTER
    ====================================================
    Script ini menangani:
    1. Menampilkan form login atau register
    2. Validasi form
    3. Fetch request ke backend
    4. Response handling dan redirect
    ====================================================
    */

    // Fungsi untuk menampilkan form login
    function tampilkanFormLogin() {
      document.getElementById('formLoginContainer').classList.remove('hidden');
      document.getElementById('formRegisterContainer').classList.add('hidden');
      bersihkanFormLogin();
    }

    // Fungsi untuk menampilkan form register
    function tampilkanFormRegister() {
      document.getElementById('formLoginContainer').classList.add('hidden');
      document.getElementById('formRegisterContainer').classList.remove('hidden');
      bersihkanFormRegister();
    }

    // Bersihkan error messages form login
    function bersihkanFormLogin() {
      document.getElementById('emailLogin').classList.remove('input-error');
      document.getElementById('passwordLogin').classList.remove('input-error');
      document.getElementById('errorEmailLogin').textContent = '';
      document.getElementById('errorPasswordLogin').textContent = '';
    }

    // Bersihkan error messages form register
    function bersihkanFormRegister() {
      document.getElementById('namaRegister').classList.remove('input-error');
      document.getElementById('emailRegister').classList.remove('input-error');
      document.getElementById('passwordRegister').classList.remove('input-error');
      document.getElementById('errorNamaRegister').textContent = '';
      document.getElementById('errorEmailRegister').textContent = '';
      document.getElementById('errorPasswordRegister').textContent = '';
    }

    // Tampilkan pesan error di input
    function tampilkanErrorInput(inputId, errorId, pesan) {
      const input = document.getElementById(inputId);
      const errorElement = document.getElementById(errorId);
      input.classList.add('input-error');
      errorElement.textContent = pesan;
      errorElement.classList.add('tampil');
    }

    // Tampilkan toast notification
    function tampilkanToast(pesan, tipe = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast-auth ${tipe}`;
      toast.textContent = pesan;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Handle form login submit
    async function handleLoginSubmit(event) {
      event.preventDefault();
      bersihkanFormLogin();

      const email = document.getElementById('emailLogin').value.trim();
      const password = document.getElementById('passwordLogin').value;
      const tombolLogin = document.getElementById('tombolLogin');

      // Validasi
      if (!email) {
        tampilkanErrorInput('emailLogin', 'errorEmailLogin', 'Email tidak boleh kosong');
        return false;
      }

      if (!password) {
        tampilkanErrorInput('passwordLogin', 'errorPasswordLogin', 'Password tidak boleh kosong');
        return false;
      }

      // Disable tombol saat proses
      tombolLogin.classList.add('loading');
      tombolLogin.textContent = 'Memproses...';

      try {
        // Kirim request ke backend
        const response = await fetch('backend/login.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          tampilkanToast('Login berhasil! Mengalihkan...', 'success');
          // Simpan nama user di localStorage untuk ditampilkan di dashboard
          localStorage.setItem('studentTodoName', data.nama);
          // Redirect ke dashboard setelah 1 detik
          setTimeout(() => {
            window.location.href = 'dashboard.php';
          }, 1000);
        } else {
          tampilkanErrorInput('emailLogin', 'errorEmailLogin', data.message || 'Login gagal');
          tampilkanToast(data.message || 'Login gagal', 'error');
        }
      } catch (error) {
        console.error('Error:', error);
        tampilkanErrorInput('emailLogin', 'errorEmailLogin', 'Terjadi kesalahan jaringan');
        tampilkanToast('Terjadi kesalahan jaringan', 'error');
      } finally {
        // Enable tombol kembali
        tombolLogin.classList.remove('loading');
        tombolLogin.textContent = 'Masuk';
      }

      return false;
    }

    // Handle form register submit
    async function handleRegisterSubmit(event) {
      event.preventDefault();
      bersihkanFormRegister();

      const nama = document.getElementById('namaRegister').value.trim();
      const email = document.getElementById('emailRegister').value.trim();
      const password = document.getElementById('passwordRegister').value;
      const tombolRegister = document.getElementById('tombolRegister');

      // Validasi
      let isValid = true;

      if (!nama) {
        tampilkanErrorInput('namaRegister', 'errorNamaRegister', 'Nama tidak boleh kosong');
        isValid = false;
      }

      if (!email) {
        tampilkanErrorInput('emailRegister', 'errorEmailRegister', 'Email tidak boleh kosong');
        isValid = false;
      }

      if (!password || password.length < 6) {
        tampilkanErrorInput('passwordRegister', 'errorPasswordRegister', 'Password minimal 6 karakter');
        isValid = false;
      }

      if (!isValid) return false;

      // Disable tombol saat proses
      tombolRegister.classList.add('loading');
      tombolRegister.textContent = 'Memproses...';

      try {
        // Kirim request ke backend
        const response = await fetch('backend/register.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ nama, email, password })
        });

        const data = await response.json();

        if (data.success) {
          tampilkanToast('Registrasi berhasil! Silakan login.', 'success');
          // Alihkan ke form login setelah 2 detik
          setTimeout(() => {
            tampilkanFormLogin();
            // Isi email field dengan email yang baru didaftar
            document.getElementById('emailLogin').value = email;
          }, 1500);
        } else {
          tampilkanErrorInput('emailRegister', 'errorEmailRegister', data.message || 'Registrasi gagal');
          tampilkanToast(data.message || 'Registrasi gagal', 'error');
        }
      } catch (error) {
        console.error('Error:', error);
        tampilkanErrorInput('emailRegister', 'errorEmailRegister', 'Terjadi kesalahan jaringan');
        tampilkanToast('Terjadi kesalahan jaringan', 'error');
      } finally {
        // Enable tombol kembali
        tombolRegister.classList.remove('loading');
        tombolRegister.textContent = 'Daftar';
      }

      return false;
    }

    // Muat form login saat halaman dibuka
    window.addEventListener('load', () => {
      tampilkanFormLogin();
      // Cek apakah user sudah login (redirect ke dashboard)
      // Ini opsional, karena backend akan cek session saat load dashboard.php
    });
  </script>
</body>
</html>
